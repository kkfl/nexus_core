name: Nexus Core V1 CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install uv
      uses: astral-sh/setup-uv@v5
    - name: Install dependencies
      run: uv sync
    - name: Format Check (Ruff)
      continue-on-error: true
      run: uv run ruff format --check .
    - name: Lint Check (Ruff)
      continue-on-error: true
      run: uv run ruff check .
    - name: Type Check (MyPy)
      continue-on-error: true
      run: uv run mypy packages/ apps/

  python-test:
    runs-on: ubuntu-latest
    needs: python-lint
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install uv
      uses: astral-sh/setup-uv@v5
    - name: Install dependencies
      run: uv sync
    - name: Run Tests
      # If RUN_INTEGRATION_TESTS is not set, this skips the heavy golden paths tests
      run: uv run pytest tests/ -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/nexus_portal
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: 'npm'
        cache-dependency-path: apps/nexus_portal/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Lint
      run: npm run lint
    - name: Build
      run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [python-test, frontend]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Build Nexus API
      uses: docker/build-push-action@v5
      with:
        context: .
        file: apps/nexus_api/Dockerfile
        push: false
        tags: nexus_api:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
    - name: Build Nexus Portal
      uses: docker/build-push-action@v5
      with:
        context: .
        file: apps/nexus_portal/Dockerfile
        push: false
        tags: nexus_portal:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
    - name: Build Worker
      uses: docker/build-push-action@v5
      with:
        context: .
        file: apps/nexus_worker/Dockerfile
        push: false
        tags: nexus_worker:latest
    - name: Build Demo Agent
      uses: docker/build-push-action@v5
      with:
        context: .
        file: apps/demo_agent/Dockerfile
        push: false
        tags: demo_agent:latest
