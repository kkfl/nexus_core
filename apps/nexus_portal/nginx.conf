server {
    listen 80;
    server_name _;
    
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to nexus-api
    location /api/ {
        proxy_pass http://nexus-api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy server-agent requests (strip /servers prefix)
    location /servers/ {
        proxy_pass http://server-agent:8010/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy PBX agent requests (strip /pbx prefix)
    location /pbx/ {
        proxy_pass http://pbx-agent:8011/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
