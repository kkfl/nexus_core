server {
    listen 80;
    server_name _;
    
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: proxy api requests if VITE_API_BASE_URL uses relative paths
    # location /api/ {
    #     proxy_pass http://nexus-api:8000/;
    #     proxy_set_header Host $host;
    # }
}
